services:
  backend:
    build:
      context: ./backend
    container_name: boekenkast-backend
    ports:
      - "3002:3000"
    volumes:
      - ./backend/prisma:/app/prisma
    environment:
      - PORT
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_USERNAME
      - AUTH_PASSWORD
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: boekenkast-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL
    depends_on:
      - backend
    restart: unless-stopped
