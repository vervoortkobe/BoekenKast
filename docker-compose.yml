services:
  backend:
    build:
      context: ./backend
    container_name: boekenkast-backend
    # Uses BACKEND_PORT from root .env
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend/prisma:/app/prisma/db
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Pulls VITE_API_URL from root .env during build
        - VITE_API_URL=${VITE_API_URL}
    container_name: boekenkast-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend
    restart: unless-stopped
